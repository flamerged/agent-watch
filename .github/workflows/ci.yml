name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install runtime tools
        run: sudo apt-get update && sudo apt-get install -y zsh jq lsof curl
      - name: Run checks
        run: ./scripts/check.sh
